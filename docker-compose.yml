services:
  dev-server:
    build:
      context: ./dev-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/auth/login > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
